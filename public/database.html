<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Просмотр БД — KENDRICK</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <style>
    .db-container {
      min-height: 100vh;
      background: #f5f7fa;
      padding: 40px 20px;
    }

    .db-header {
      text-align: center;
      margin-bottom: 40px;
    }

    .db-header h1 {
      font-size: 32px;
      font-weight: 600;
      margin-bottom: 8px;
      color: #1a1a1a;
    }

    .db-header p {
      color: #666;
      font-size: 16px;
    }

    .db-tables {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }

    .db-table-card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      cursor: pointer;
      transition: all 0.3s ease;
      border-left: 4px solid #667eea;
    }

    .db-table-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
    }

    .db-table-card h3 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 8px;
      color: #1a1a1a;
    }

    .db-table-count {
      font-size: 24px;
      font-weight: 700;
      color: #667eea;
      margin: 12px 0;
    }

    .db-table-label {
      font-size: 13px;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .db-content {
      background: white;
      border-radius: 12px;
      padding: 30px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
      margin-bottom: 40px;
      display: none;
    }

    .db-content.active {
      display: block;
    }

    .db-content h2 {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 20px;
      color: #1a1a1a;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .db-close-btn {
      background: #f0f0f0;
      border: none;
      border-radius: 6px;
      padding: 8px 16px;
      cursor: pointer;
      margin-left: auto;
      font-weight: 500;
      transition: background 0.2s;
    }

    .db-close-btn:hover {
      background: #e0e0e0;
    }

    .db-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
      margin-top: 20px;
    }

    .db-table thead {
      background: #f8f9fa;
      border-bottom: 2px solid #e0e0e0;
    }

    .db-table th {
      padding: 12px;
      text-align: left;
      font-weight: 600;
      color: #333;
    }

    .db-table td {
      padding: 12px;
      border-bottom: 1px solid #f0f0f0;
      color: #666;
    }

    .db-table tbody tr:hover {
      background: #f8f9fa;
    }

    .db-table tbody tr:nth-child(even) {
      background: #fafbfc;
    }

    .db-empty {
      text-align: center;
      padding: 40px;
      color: #999;
    }

    .db-empty-icon {
      font-size: 48px;
      margin-bottom: 16px;
    }

    .db-loading {
      text-align: center;
      padding: 40px;
      color: #667eea;
    }

    .spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid #f0f0f0;
      border-top: 3px solid #667eea;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 10px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .db-stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 12px;
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid #e0e0e0;
    }

    .db-stat {
      background: #f8f9fa;
      padding: 12px;
      border-radius: 6px;
      text-align: center;
    }

    .db-stat-value {
      font-size: 20px;
      font-weight: 700;
      color: #667eea;
    }

    .db-stat-label {
      font-size: 12px;
      color: #999;
      margin-top: 4px;
    }

    .db-scroll {
      overflow-x: auto;
    }

    @media (max-width: 768px) {
      .db-container {
        padding: 20px 10px;
      }

      .db-tables {
        grid-template-columns: 1fr;
      }

      .db-table {
        font-size: 12px;
      }

      .db-table th,
      .db-table td {
        padding: 8px;
      }
    }
  </style>
</head>

<body>
  <header class="header">
    <div class="header-inner">
      <a href="/" class="logo">KENDRICK</a>
      <nav class="nav">
        <a href="/" class="nav-link">Каталог</a>
        <a href="/favorites.html" class="nav-link fav-link">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z" />
          </svg>
        </a>
        <a href="/cart.html" class="nav-link cart-link">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z" />
          </svg>
        </a>
        <button id="theme-toggle" class="nav-link theme-toggle" title="Переключить тему">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="5"/>
            <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
          </svg>
        </button>
      </nav>
    </div>
  </header>

  <div class="db-container">
    <div class="db-header">
      <h1>🗄️ Просмотр БД</h1>
      <p>Все данные вашей базы данных</p>
    </div>

    <div class="db-tables" id="tablesContainer">
      <div class="db-loading">
        <span class="spinner"></span> Загрузка таблиц...
      </div>
    </div>

    <div class="db-content" id="tableContent">
      <h2>
        <span id="tableName"></span>
        <button class="db-close-btn" onclick="closeTableView()">Закрыть</button>
      </h2>
      <div id="tableStats" class="db-stats"></div>
      <div class="db-scroll">
        <table class="db-table" id="dataTable">
          <thead><tr id="headerRow"></tr></thead>
          <tbody id="dataBody"></tbody>
        </table>
      </div>
      <div class="db-empty" id="emptyMessage" style="display: none;">
        <div class="db-empty-icon">📭</div>
        <p>Нет данных в этой таблице</p>
      </div>
    </div>
  </div>

  <script src="/js/main.js"></script>
  <script>
    let currentTable = null;

    async function loadTables() {
      try {
        const response = await fetch('/api/database/tables');
        const data = await response.json();

        if (data.success) {
          displayTables(data.tables);
        }
      } catch (error) {
        console.error('Error loading tables:', error);
      }
    }

    function displayTables(tables) {
      const container = document.getElementById('tablesContainer');
      container.innerHTML = '';

      for (const [tableName, count] of Object.entries(tables)) {
        const card = document.createElement('div');
        card.className = 'db-table-card';
        card.innerHTML = `
          <h3>${tableName}</h3>
          <div class="db-table-count">${count}</div>
          <div class="db-table-label">записей</div>
        `;
        card.addEventListener('click', () => loadTableData(tableName));
        container.appendChild(card);
      }
    }

    async function loadTableData(tableName) {
      currentTable = tableName;
      document.getElementById('tableContent').classList.add('active');

      const headerRow = document.getElementById('headerRow');
      const dataBody = document.getElementById('dataBody');
      const emptyMessage = document.getElementById('emptyMessage');
      const tableStats = document.getElementById('tableStats');

      headerRow.innerHTML = '';
      dataBody.innerHTML = '';
      emptyMessage.style.display = 'none';

      // Загружаем schema
      try {
        const schemaResponse = await fetch(`/api/database/${tableName}/schema`);
        const schemaData = await schemaResponse.json();

        if (schemaData.success) {
          const columns = schemaData.columns;

          // Показываем статистику схемы
          tableStats.innerHTML = `
            <div class="db-stat">
              <div class="db-stat-value">${columns.length}</div>
              <div class="db-stat-label">Колонок</div>
            </div>
          `;

          // Заполняем заголовки
          for (const col of columns) {
            const th = document.createElement('th');
            th.textContent = col.name;
            headerRow.appendChild(th);
          }
        }
      } catch (error) {
        console.error('Error loading schema:', error);
      }

      // Загружаем данные
      try {
        const dataResponse = await fetch(`/api/database/${tableName}`);
        const responseData = await dataResponse.json();

        if (responseData.success) {
          document.getElementById('tableName').textContent = `Таблица: ${tableName}`;
          
          // Обновляем статистику
          const stats = tableStats.innerHTML;
          tableStats.innerHTML = stats + `
            <div class="db-stat">
              <div class="db-stat-value">${responseData.totalCount}</div>
              <div class="db-stat-label">Всего записей</div>
            </div>
          `;

          if (responseData.data.length === 0) {
            emptyMessage.style.display = 'block';
            document.getElementById('dataTable').style.display = 'none';
          } else {
            document.getElementById('dataTable').style.display = 'table';
            
            for (const row of responseData.data) {
              const tr = document.createElement('tr');
              for (const key in row) {
                const td = document.createElement('td');
                let value = row[key];
                
                // Форматируем значение
                if (value === null) {
                  td.textContent = '(null)';
                  td.style.color = '#ccc';
                } else if (typeof value === 'string' && value.length > 50) {
                  td.textContent = value.substring(0, 50) + '...';
                  td.title = value;
                } else {
                  td.textContent = value;
                }
                
                tr.appendChild(td);
              }
              dataBody.appendChild(tr);
            }
          }
        }
      } catch (error) {
        console.error('Error loading data:', error);
      }
    }

    function closeTableView() {
      document.getElementById('tableContent').classList.remove('active');
      currentTable = null;
    }

    // Загружаем таблицы при загрузке страницы
    loadTables();
  </script>
</body>

</html>
