<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход — KENDRICK Admin</title>
  <link rel="stylesheet" href="/css/chatbot.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0a;
      overflow: hidden;
      position: relative;
    }

    /* ===== Animated background ===== */
    .bg-grid {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
    }

    .bg-grid::before {
      content: '';
      position: absolute;
      inset: -50%;
      background-image:
        linear-gradient(rgba(255,255,255,.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px);
      background-size: 60px 60px;
      animation: gridMove 20s linear infinite;
    }

    @keyframes gridMove {
      0% { transform: translate(0, 0) rotate(0deg); }
      100% { transform: translate(60px, 60px) rotate(0deg); }
    }

    /* Floating orbs */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.4;
      z-index: 0;
    }

    .orb-1 {
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, #1a1a2e, transparent 70%);
      top: -100px;
      right: -100px;
      animation: orbFloat1 15s ease-in-out infinite;
    }

    .orb-2 {
      width: 350px;
      height: 350px;
      background: radial-gradient(circle, #16213e, transparent 70%);
      bottom: -80px;
      left: -80px;
      animation: orbFloat2 18s ease-in-out infinite;
    }

    .orb-3 {
      width: 250px;
      height: 250px;
      background: radial-gradient(circle, #1a1a2e, transparent 70%);
      top: 50%;
      left: 50%;
      animation: orbFloat3 12s ease-in-out infinite;
    }

    @keyframes orbFloat1 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(-60px, 40px) scale(1.1); }
      66% { transform: translate(30px, -20px) scale(0.9); }
    }

    @keyframes orbFloat2 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(50px, -30px) scale(1.15); }
      66% { transform: translate(-40px, 50px) scale(0.85); }
    }

    @keyframes orbFloat3 {
      0%, 100% { transform: translate(-50%, -50%) scale(1); }
      50% { transform: translate(-50%, -50%) scale(1.3); }
    }

    /* ===== Login card ===== */
    .login-card {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 420px;
      padding: 48px 40px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(20px);
      animation: cardAppear 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      opacity: 0;
      transform: translateY(30px) scale(0.96);
    }

    @keyframes cardAppear {
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    /* Glowing border effect */
    .login-card::before {
      content: '';
      position: absolute;
      inset: -1px;
      background: linear-gradient(
        135deg,
        rgba(255,255,255,0.1) 0%,
        transparent 50%,
        rgba(255,255,255,0.05) 100%
      );
      z-index: -1;
      opacity: 0;
      transition: opacity 0.5s;
    }

    .login-card:hover::before {
      opacity: 1;
    }

    /* ===== Logo ===== */
    .login-logo {
      text-align: center;
      margin-bottom: 12px;
      animation: logoReveal 1s cubic-bezier(0.16, 1, 0.3, 1) 0.2s forwards;
      opacity: 0;
      transform: translateY(10px);
    }

    @keyframes logoReveal {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .login-logo h1 {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 2.4rem;
      font-weight: 600;
      letter-spacing: 10px;
      color: #fff;
      text-transform: uppercase;
    }

    .login-logo-sub {
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.3);
      margin-top: 4px;
    }

    .login-divider {
      width: 40px;
      height: 1px;
      background: rgba(255, 255, 255, 0.15);
      margin: 28px auto;
      animation: dividerGrow 0.8s ease 0.4s forwards;
      transform: scaleX(0);
    }

    @keyframes dividerGrow {
      to { transform: scaleX(1); }
    }

    .login-subtitle {
      text-align: center;
      color: rgba(255, 255, 255, 0.4);
      font-size: 0.85rem;
      letter-spacing: 1px;
      margin-bottom: 32px;
      animation: logoReveal 1s cubic-bezier(0.16, 1, 0.3, 1) 0.5s forwards;
      opacity: 0;
      transform: translateY(10px);
    }

    /* ===== Form ===== */
    .login-form {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .input-group {
      position: relative;
      animation: inputSlideUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      opacity: 0;
      transform: translateY(15px);
    }

    .input-group:nth-child(1) { animation-delay: 0.6s; }
    .input-group:nth-child(2) { animation-delay: 0.7s; }

    @keyframes inputSlideUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .input-group label {
      display: block;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.35);
      margin-bottom: 8px;
      transition: color 0.3s;
    }

    .input-group:focus-within label {
      color: rgba(255, 255, 255, 0.7);
    }

    .input-wrap {
      position: relative;
    }

    .input-icon {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: rgba(255, 255, 255, 0.2);
      transition: color 0.3s;
      pointer-events: none;
    }

    .input-group:focus-within .input-icon {
      color: rgba(255, 255, 255, 0.6);
    }

    .login-input {
      width: 100%;
      padding: 14px 16px 14px 48px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: #fff;
      font-size: 0.9rem;
      font-family: 'DM Sans', sans-serif;
      letter-spacing: 0.5px;
      transition: all 0.3s;
      outline: none;
    }

    .login-input::placeholder {
      color: rgba(255, 255, 255, 0.2);
    }

    .login-input:focus {
      border-color: rgba(255, 255, 255, 0.25);
      background: rgba(255, 255, 255, 0.06);
      box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.03);
    }

    /* ===== Button ===== */
    .login-btn-wrap {
      animation: inputSlideUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) 0.8s forwards;
      opacity: 0;
      transform: translateY(15px);
    }

    .login-btn {
      width: 100%;
      padding: 16px 24px;
      background: #fff;
      color: #0a0a0a;
      border: none;
      font-family: 'DM Sans', sans-serif;
      font-weight: 600;
      font-size: 0.8rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: all 0.3s;
    }

    .login-btn:hover {
      background: #e8e8e8;
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
    }

    .login-btn:active {
      transform: translateY(0) scale(0.98);
    }

    /* Button shine effect */
    .login-btn::after {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: linear-gradient(
        transparent,
        rgba(255, 255, 255, 0.3),
        transparent
      );
      transform: rotate(45deg) translateX(-100%);
      transition: none;
    }

    .login-btn:hover::after {
      transition: transform 0.6s;
      transform: rotate(45deg) translateX(100%);
    }

    /* Loading state */
    .login-btn.loading {
      color: transparent;
      pointer-events: none;
    }

    .login-btn.loading::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 20px;
      height: 20px;
      margin: -10px 0 0 -10px;
      border: 2px solid rgba(10, 10, 10, 0.2);
      border-top-color: #0a0a0a;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ===== Error message ===== */
    .login-error {
      text-align: center;
      color: #ef4444;
      font-size: 0.82rem;
      font-weight: 500;
      padding: 12px 16px;
      background: rgba(239, 68, 68, 0.08);
      border: 1px solid rgba(239, 68, 68, 0.15);
      display: none;
      animation: shakeError 0.4s ease;
    }

    .login-error.visible {
      display: block;
    }

    @keyframes shakeError {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-8px); }
      40% { transform: translateX(8px); }
      60% { transform: translateX(-4px); }
      80% { transform: translateX(4px); }
    }

    /* ===== Success animation ===== */
    .login-card.success {
      animation: cardSuccess 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes cardSuccess {
      0% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.02); }
      100% { transform: scale(0.95); opacity: 0; }
    }

    /* ===== Particles ===== */
    .particles {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
    }

    .particle {
      position: absolute;
      width: 2px;
      height: 2px;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 50%;
    }

    .particle:nth-child(1) { top: 20%; left: 10%; animation: particleFloat 8s ease-in-out infinite; }
    .particle:nth-child(2) { top: 60%; left: 85%; animation: particleFloat 10s ease-in-out 1s infinite; }
    .particle:nth-child(3) { top: 80%; left: 30%; animation: particleFloat 7s ease-in-out 2s infinite; }
    .particle:nth-child(4) { top: 15%; left: 70%; animation: particleFloat 9s ease-in-out 0.5s infinite; }
    .particle:nth-child(5) { top: 45%; left: 50%; animation: particleFloat 11s ease-in-out 3s infinite; }
    .particle:nth-child(6) { top: 70%; left: 15%; animation: particleFloat 8s ease-in-out 1.5s infinite; }
    .particle:nth-child(7) { top: 35%; left: 90%; animation: particleFloat 12s ease-in-out 2.5s infinite; }
    .particle:nth-child(8) { top: 90%; left: 60%; animation: particleFloat 9s ease-in-out 0.8s infinite; }

    @keyframes particleFloat {
      0%, 100% { transform: translate(0, 0); opacity: 0.15; }
      25% { transform: translate(20px, -30px); opacity: 0.4; }
      50% { transform: translate(-10px, -60px); opacity: 0.15; }
      75% { transform: translate(15px, -30px); opacity: 0.3; }
    }

    /* ===== Responsive ===== */
    @media (max-width: 480px) {
      .login-card {
        margin: 16px;
        padding: 36px 28px;
      }

      .login-logo h1 {
        font-size: 1.8rem;
        letter-spacing: 6px;
      }
    }
  </style>
</head>

<body>
  <!-- Animated background -->
  <div class="bg-grid"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <div class="particles">
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
  </div>

  <!-- Login card -->
  <div class="login-card" id="login-card">
    <div class="login-logo">
      <h1>KENDRICK</h1>
      <div class="login-logo-sub">Admin Panel</div>
    </div>

    <div class="login-divider"></div>

    <p class="login-subtitle">Войдите для доступа к панели управления</p>

    <div class="login-error" id="login-error"></div>

    <form class="login-form" id="login-form">
      <div class="input-group">
        <label for="email">Email</label>
        <div class="input-wrap">
          <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="4" width="20" height="16" rx="2"/>
            <path d="M22 7l-10 6L2 7"/>
          </svg>
          <input type="email" id="email" class="login-input" placeholder="Введите email" autocomplete="email" required>
        </div>
      </div>

      <div class="input-group">
        <label for="password">Пароль</label>
        <div class="input-wrap">
          <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          <input type="password" id="password" class="login-input" placeholder="Введите пароль" autocomplete="current-password" required>
        </div>
      </div>

      <div class="login-btn-wrap">
        <button type="submit" class="login-btn" id="login-btn">Войти</button>
      </div>

      <div style="text-align: center; margin-top: 20px; color: rgba(255, 255, 255, 0.6); font-size: 14px;">
        Нет аккаунта? <a href="/register.html" style="color: #fff; font-weight: 500; text-decoration: none; transition: opacity 0.3s;">Создайте один</a>
      </div>
    </form>
  </div>

  <script>
    // If already authenticated, redirect to admin
    const token = localStorage.getItem('admin_token');
    if (token) {
      fetch('/api/auth/check', {
        headers: { 'X-Admin-Token': token }
      })
      .then(r => r.json())
      .then(data => {
        if (data.authenticated) {
          window.location.href = '/admin.html';
        }
      })
      .catch(() => {});
    }

    const form = document.getElementById('login-form');
    const btn = document.getElementById('login-btn');
    const errorEl = document.getElementById('login-error');
    const card = document.getElementById('login-card');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      // Hide previous error
      errorEl.classList.remove('visible');

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!email || !password) return;

      // Loading state
      btn.classList.add('loading');

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
        });

        const data = await res.json();

        if (data.success && data.token) {
          localStorage.setItem('admin_token', data.token);

          // Success animation then redirect
          card.classList.add('success');
          setTimeout(() => {
            window.location.href = '/admin.html';
          }, 500);
        } else {
          btn.classList.remove('loading');
          errorEl.textContent = data.error || 'Ошибка входа';
          errorEl.classList.remove('visible');
          // Force reflow for re-triggering animation
          void errorEl.offsetWidth;
          errorEl.classList.add('visible');
        }
      } catch (err) {
        btn.classList.remove('loading');
        errorEl.textContent = 'Ошибка соединения с сервером';
        errorEl.classList.remove('visible');
        void errorEl.offsetWidth;
        errorEl.classList.add('visible');
      }
    });
  </script>
  <script src="/js/chatbot.js"></script>
</body>

</html>
